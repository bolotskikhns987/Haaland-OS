name: Build fixed index
on:
  push:
    branches: [chatgpt-build-fixed-index-20260721]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    if: "!contains(github.event.head_commit.message, 'Apply corrected index artifact')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: chatgpt-build-fixed-index-20260721
      - name: Remove premature script closing tag
        shell: python
        run: |
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text(encoding='utf-8')
          broken = "})();\n</script>\n\nfunction init(){"
          fixed = "})();\n\nfunction init(){"
          if s.count(broken) != 1:
              raise SystemExit(f'Expected exactly one broken marker, found {s.count(broken)}')
          p.write_text(s.replace(broken, fixed, 1), encoding='utf-8')
      - name: Validate corrected structure
        shell: python
        run: |
          from pathlib import Path
          import re
          s = Path('index.html').read_text(encoding='utf-8')
          assert "})();\n</script>\n\nfunction init(){" not in s
          assert "})();\n\nfunction init(){" in s
          assert s.rstrip().endswith('</body></html>')
          assert s.count('<script') == s.count('</script>')
          blocks = re.findall(r'<script[^>]*>(.*?)</script>', s, flags=re.S|re.I)
          Path('/tmp/app.js').write_text('\n'.join(blocks), encoding='utf-8')
      - name: JavaScript syntax check
        run: node --check /tmp/app.js
      - name: Commit corrected file to temporary branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Apply corrected index artifact"
          git push origin HEAD:chatgpt-build-fixed-index-20260721
