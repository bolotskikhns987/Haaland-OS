name: Build exact visual release
on:
  push:
    branches: [chatgpt-build-fixed-index-20260721]
  pull_request:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: chatgpt-build-fixed-index-20260721
      - name: Repair inherited script boundary
        shell: python
        run: |
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text(encoding='utf-8')
          broken = "})();\n</script>\n\nfunction init(){"
          fixed = "})();\n\nfunction init(){"
          if s.count(broken) > 1:
              raise SystemExit('Unexpected duplicate broken boundary')
          if broken in s:
              s = s.replace(broken, fixed, 1)
              p.write_text(s, encoding='utf-8')
      - name: Install build dependencies
        run: python -m pip install --disable-pip-version-check pillow
      - name: Build final self-contained visual release
        run: python scripts/build_visual_release.py
      - name: Validate generated release
        shell: python
        run: |
          from pathlib import Path
          import json, re, base64, io
          from PIL import Image
          html = Path('index.html').read_text(encoding='utf-8')
          assert 'bh30-visual-script' not in html
          assert 'bh-exact-visual-script' in html
          assert 'const V=' in html
          assert 'window.__BH_EXACT_VISUAL_IDS' in html
          ids = re.findall(r'"([a-z0-9-]+)":"data:image/jpeg;base64,', html)
          assert len(ids) == 26, len(ids)
          assert len(set(ids)) == 26
          payloads = re.findall(r'data:image/jpeg;base64,([A-Za-z0-9+/=]+)', html)
          assert len(payloads) >= 26
          for raw in payloads[-26:]:
              im = Image.open(io.BytesIO(base64.b64decode(raw)))
              assert im.size == (840, 520), im.size
              im.verify()
          qa = json.loads(Path('qa-build.json').read_text(encoding='utf-8'))
          assert qa['visual_assets'] == 26
          assert qa['embedded_data_uris'] == 26
          assert all(Path(f'proof-{i}.png').exists() for i in range(1,5))
          assert Path('Bolot-Holland-EXACT-VISUALS.zip').exists()
          assert html.rstrip().endswith('</html>')
          assert html.count('<script') == html.count('</script>')
          blocks = re.findall(r'<script[^>]*>(.*?)</script>', html, flags=re.S|re.I)
          Path('/tmp/app.js').write_text('\n'.join(blocks), encoding='utf-8')
      - name: JavaScript syntax check
        run: node --check /tmp/app.js
      - name: Upload final release and proof screenshots
        uses: actions/upload-artifact@v4
        with:
          name: Bolot-Holland-EXACT-VISUALS
          path: |
            index.html
            Bolot-Holland-EXACT-VISUALS.zip
            qa-build.json
            RELEASE-NOTES.txt
            proof-1.png
            proof-2.png
            proof-3.png
            proof-4.png
          if-no-files-found: error
          retention-days: 7
